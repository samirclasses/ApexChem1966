<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isomerism Quiz - Higher Level</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
}

.quiz-box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question{
    margin-bottom:20px;
    font-weight:bold;
}

.options{
    margin-left:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>
<h3>Apex Chemistry</h3>
<h1>Isomerism </h1>

<div class="quiz-box">
<form id="quizForm"></form>

<center>
<button type="button" onclick="calculateScore()">Submit Quiz</button>
</center>

<div id="result"></div>
</div>

<script>

const quizData = [

{
question: "1. Maximum number of chain isomers possible for C6H14 is:",
options:["3","4","5","6"],
answer:2
},
{
question: "2. Number of geometrical isomers possible for C4H8 (excluding cyclic) is:",
options:["1","2","3","4"],
answer:1
},
{
question: "3. Number of optical isomers possible for 2,3-dichlorobutane:",
options:["1","2","3","4"],
answer:2
},
{
question: "4. Which compound shows metamerism?",
options:["Ethers","Alcohols","Alkanes","Aldehydes"],
answer:0
},
{
question: "5. Total stereoisomers possible for tartaric acid:",
options:["2","3","4","5"],
answer:1
},
{
question: "6. Which compound shows tautomerism?",
options:["Acetone","Ethanol","Benzene","Ethane"],
answer:0
},
{
question: "7. Number of structural isomers of C3H6O (aldehyde/ketone only):",
options:["1","2","3","4"],
answer:1
},
{
question: "8. Number of chiral centers in glucose (open chain):",
options:["3","4","5","6"],
answer:2
},
{
question: "9. Maximum stereoisomers possible for compound with 4 chiral centers:",
options:["8","16","4","12"],
answer:1
},
{
question: "10. Geometrical isomerism is possible due to:",
options:["Free rotation","Restricted rotation","Hybridization","Branching"],
answer:1
},
{
question: "11. Which shows position isomerism?",
options:["1-butanol & 2-butanol","Butane & isobutane","Ethanol & dimethyl ether","None"],
answer:0
},
{
question: "12. Number of optical isomers of lactic acid:",
options:["1","2","3","4"],
answer:1
},
{
question: "13. Cis-trans isomerism is absent in:",
options:["Alkenes","Alkanes","Cycloalkanes","Oximes"],
answer:1
},
{
question: "14. Functional isomer of ethanol:",
options:["Methanol","Dimethyl ether","Acetone","Ethane"],
answer:1
},
{
question: "15. Metamerism is shown by compounds having:",
options:["Same alkyl groups","Different alkyl groups around polyvalent atom","Double bond","Triple bond"],
answer:1
},
{
question: "16. Number of geometrical isomers of C5H10 (open chain):",
options:["3","4","5","2"],
answer:3
},
{
question: "17. Racemic mixture contains:",
options:["Only D form","Only L form","Equal D & L forms","Mesocompound"],
answer:2
},
{
question: "18. Mesocompound is optically inactive due to:",
options:["Chirality","Internal symmetry","External symmetry","Racemic mixture"],
answer:1
},
{
question: "19. Which cannot show optical isomerism?",
options:["2-butanol","2-propanol","Lactic acid","Glyceraldehyde"],
answer:1
},
{
question: "20. Tautomerism involves:",
options:["Bond rotation","Migration of hydrogen","Chain rearrangement","Functional change only"],
answer:1
},
{
question: "21. Maximum stereoisomers for 3 chiral centers:",
options:["6","8","4","12"],
answer:1
},
{
question: "22. Which is not a type of structural isomerism?",
options:["Chain","Position","Geometrical","Functional"],
answer:2
},
{
question: "23. Optical activity requires:",
options:["Plane of symmetry","Chiral carbon","Double bond","Triple bond"],
answer:1
},
{
question: "24. Enantiomers differ in:",
options:["Melting point","Boiling point","Optical rotation","Density"],
answer:2
},
{
question: "25. Number of structural isomers possible for C4H10:",
options:["1","2","3","4"],
answer:1
}

];

const form = document.getElementById("quizForm");

quizData.forEach((q,index)=>{
    const questionDiv = document.createElement("div");
    questionDiv.classList.add("question");
    questionDiv.innerHTML = q.question;
    form.appendChild(questionDiv);

    const optionsDiv = document.createElement("div");
    optionsDiv.classList.add("options");

    q.options.forEach((option,i)=>{
        const label = document.createElement("label");
        label.innerHTML = `
            <input type="radio" name="q${index}" value="${i}">
            ${option}
        `;
        optionsDiv.appendChild(label);
        optionsDiv.appendChild(document.createElement("br"));
    });

    form.appendChild(optionsDiv);
});

function calculateScore(){
    let score = 0;
    let attempted = 0;

    quizData.forEach((q,index)=>{
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if(selected){
            attempted++;
            if(parseInt(selected.value) === q.answer){
                score += 4;
            }
        }
    });

    const totalMarks = quizData.length * 4;
    const percentage = ((score/totalMarks)*100).toFixed(2);

    document.getElementById("result").innerHTML =
        `Attempted: ${attempted} / ${quizData.length}<br>
         Total Marks: ${score} / ${totalMarks}<br>
         Percentage: ${percentage}%`;
}

</script>

</body>
</html>
