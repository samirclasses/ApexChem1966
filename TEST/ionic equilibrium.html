<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ionic Equilibrium</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}
h1{
    text-align:center;
    color:#2c3e50;
}
.question{
    margin-bottom:20px;
    padding:15px;
    border-bottom:1px solid #ddd;
}
.options label{
    display:block;
    margin:6px 0;
    cursor:pointer;
}
button{
    display:block;
    margin:25px auto;
    padding:12px 30px;
    font-size:16px;
    background:#2e86de;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#1b4f72;
}
.result{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    margin-top:20px;
}
.correct{
    background:#d4edda;
}
.wrong{
    background:#f8d7da;
}
.answer{
    font-size:14px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<h3>Apex Chemistry</h3>
<h1>Ionic Equilibrium </h1>
<p><b>Total Questions:</b> 25 | <b>Marks per Question:</b> 4 | <b>Total Marks:</b> 100</p>

<form id="quizForm"></form>

<button type="button" onclick="submitQuiz()">Submit Test</button>

<div class="result" id="result"></div>

</div>

<script>

const quizData = [

{q:"1. Mixing equal moles of strong acid and strong base results in pH:", options:["7","<7",">7","Depends"], answer:0},
{q:"2. If Ka increases, acid strength:", options:["Increases","Decreases","No change","Zero"], answer:0},
{q:"3. Diluting weak acid increases degree of dissociation because:", options:["Le Chatelier principle","Common ion","Ksp","Kw"], answer:0},
{q:"4. For buffer when [salt]=[acid], pH equals:", options:["pKa","7","14","pKb"], answer:0},
{q:"5. If ionic product > Ksp:", options:["Precipitation occurs","Solution unsaturated","No change","Neutral"], answer:0},
{q:"6. pH of 0.001M HCl:", options:["3","2","1","4"], answer:0},
{q:"7. pOH of 0.01M NaOH:", options:["2","12","1","13"], answer:0},
{q:"8. Maximum buffer capacity occurs when:", options:["pH=pKa","pH=7","Acid only","Salt only"], answer:0},
{q:"9. Solubility decreases due to:", options:["Common ion effect","Dilution","Heating","Stirring"], answer:0},
{q:"10. Hydrolysis of NH4Cl makes solution:", options:["Acidic","Basic","Neutral","Buffer"], answer:0},
{q:"11. pKa + pKb at 25°C equals:", options:["14","7","1","0"], answer:0},
{q:"12. If pH=4, [H+] is:", options:["10^-4","10^-7","10^-10","4"], answer:0},
{q:"13. Weak acid formula approx pH =", options:["½(pKa - logC)","logC","pKa+log","None"], answer:0},
{q:"14. At equivalence in strong acid-weak base titration pH is:", options:["<7",">7","7","14"], answer:0},
{q:"15. Solubility of AgCl increases in:", options:["NH3","NaCl","KCl","AgNO3"], answer:0},
{q:"16. Neutral pH at 50°C is:", options:["<7","7",">7","14"], answer:0},
{q:"17. For AB2 salt Ksp relation is:", options:["4s^3","s^2","2s","s"], answer:0},
{q:"18. Strongest conjugate base:", options:["CH3COO-","Cl-","NO3-","HSO4-"], answer:0},
{q:"19. If pH=2 and diluted 100 times new pH:", options:["4","2","1","3"], answer:0},
{q:"20. Hydrolysis constant depends on:", options:["Ka/Kb","Pressure","Volume","Temp only"], answer:0},
{q:"21. When pH < pKa acid is mostly:", options:["Unionised","Ionised","Strong","Neutral"], answer:0},
{q:"22. Amphiprotic substance:", options:["H2O","HCl","NaOH","KCl"], answer:0},
{q:"23. Ionic strength affects:", options:["Activity","Molarity","Temp","Pressure"], answer:0},
{q:"24. Common ion shifts equilibrium:", options:["Backward","Forward","None","Random"], answer:0},
{q:"25. Kw increases with temperature means:", options:["Neutral pH decreases","Neutral pH increases","No change","Zero"], answer:0}

];

const form = document.getElementById("quizForm");

quizData.forEach((item,index)=>{
    let div=document.createElement("div");
    div.classList.add("question");
    div.innerHTML="<b>"+item.q+"</b><div class='options'>"+
    item.options.map((opt,i)=>`
    <label>
    <input type="radio" name="q${index}" value="${i}"> ${opt}
    </label>
    `).join("")+
    "</div><div class='answer' id='ans"+index+"'></div>";
    form.appendChild(div);
});

function submitQuiz(){

let score=0;
let correctCount=0;
let wrongCount=0;
let attempted=0;

quizData.forEach((item,index)=>{

let selected=document.querySelector(`input[name="q${index}"]:checked`);
let qDiv=document.getElementsByClassName("question")[index];

if(selected){
attempted++;

if(parseInt(selected.value)===item.answer){
score+=4;
correctCount++;
qDiv.classList.add("correct");
}else{
wrongCount++;
qDiv.classList.add("wrong");
}
}else{
qDiv.classList.add("wrong");
}

document.getElementById("ans"+index).innerHTML=
"Correct Answer: <b>"+item.options[item.answer]+"</b>";

});

let percentage=(score/100)*100;
let status=percentage>=40?"PASS ✅":"FAIL ❌";

document.getElementById("result").innerHTML=
`
<hr>
Attempted: ${attempted}/25 <br>
Correct: ${correctCount} <br>
Wrong: ${wrongCount} <br><br>
Final Score: ${score} / 100 <br>
Percentage: ${percentage.toFixed(2)}% <br>
Result: ${status}
`;

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
