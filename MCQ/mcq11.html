const form = document.getElementById("quizForm");

// Render Questions
questions.forEach((item, index) => {
let div = document.createElement("div");
div.className = "question";
div.id = "q" + index;

let html = `<p>${index+1}. ${item.q}</p>`;

item.options.forEach((opt, i) => {
let val = ["a","b","c","d"][i];
html += `<label>
<input type="radio" name="q${index}" value="${val}"> ${opt}
</label><br>`;
});

div.innerHTML = html;
form.appendChild(div);
});


// Submit Quiz
function submitQuiz(){
let score = 0;

questions.forEach((item, index) => {

let selected = document.querySelector(`input[name=q${index}]:checked`);
let div = document.getElementById("q"+index);

if(!item.answer) return; // skip if answer not filled

// highlight correct option
let options = div.querySelectorAll("input");
options.forEach(opt => {
if(opt.value === item.answer){
opt.parentElement.classList.add("correct");
}
});

// check selected
if(selected){
if(selected.value === item.answer){
score += 4;
} else {
selected.parentElement.classList.add("wrong");
}
}
});

document.getElementById("result").innerText =
"Your Score: " + score + " / 180";
}


// Show Answer Codes
function showAnswers(){
let html = "<h3>Answer Codes</h3><ol>";

questions.forEach((q,i)=>{
if(q.answer){
html += `<li>Q${i+1}: ${q.answer.toUpperCase()}</li>`;
}
});

html += "</ol>";

document.getElementById("answers").innerHTML = html;
}
