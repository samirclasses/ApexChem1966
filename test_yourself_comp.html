<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEET 2026 Quiz Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header{
            width:100%;
            padding:25px 0;
            text-align:center;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(6px);
            color:white;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        header h1{
            font-size:32px;
            letter-spacing:1px;
        }

        header p{
            margin-top:8px;
            font-size:16px;
            opacity:0.9;
        }

        .dashboard {
            background:white;
            width:90%;
            max-width:900px;
            margin:40px auto;
            padding:40px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .quiz-container {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
            margin-top:20px;
        }

        .quiz-link {
            display:flex;
            align-items:center;
            justify-content:center;
            padding:18px;
            text-decoration:none;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color:white;
            font-weight:600;
            border-radius:10px;
            transition: all 0.3s ease;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        .quiz-link:hover {
            transform: translateY(-5px);
            box-shadow:0 10px 20px rgba(0,0,0,0.25);
        }

        footer{
            margin-top:auto;
            width:100%;
            text-align:center;
            padding:15px;
            background: rgba(0,0,0,0.2);
            color:white;
            font-size:14px;
        }

        @media(max-width:500px){
            header h1{
                font-size:24px;
            }
            .dashboard{
                padding:25px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Apex Chemistry</h1>
    <h2>Test Your Preparation | Improve Your Rank</h2>
   
</header>

<div class="dashboard">
    <div class="quiz-container">
       <a class="quiz-link" href="https://docs.google.com/forms/d/e/1FAIpQLSctucLNF6xo3rLx0dGhQQg9ggN5mT69Y9iXxbBzc5BMCRXgJw/viewform?usp=header">Neet Practice paper 1</a>
       <a class="quiz-link" href="https://docs.google.com/forms/d/e/1FAIpQLSfM_3_wd2SxundzYhNzhlpX2qPkbmsXCjWKfEsxcrfCXa9wUA/viewform?usp=header">Neet Practice paper 2</a>
       <a class="quiz-link" href="https://docs.google.com/forms/d/e/1FAIpQLSdO8sKjsx-I_K9uwGZmhlzKnvKRnKKuJMjuvoAqw89zfiDUIg/viewform?usp=header">Neet Practice paper 3</a>
       <a class="quiz-link" href="https://docs.google.com/forms/d/e/1FAIpQLScvyhfQF__w97agqqPptBIN_J0gME3nMO4866YLziRzqVWnCw/viewform?usp=header">Neet Practice paper 4</a>
       <a class="quiz-link" href="https://docs.google.com/forms/d/e/1FAIpQLSdYLE7H204WCskwxpmkBIejsOKuxAlzYojalnDT6HANFDkboA/viewform?usp=header">Neet Practice paper 5</a>
       <a class="quiz-link" href="TEST/neet2026_6.html">Neet Practice paper 6</a>
    </div>
</div>

<footer>
    © 2026 Apex Chemistry | All Rights Reserved
</footer>

</body>
</html>
