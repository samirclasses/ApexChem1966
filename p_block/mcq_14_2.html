<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 14 Elements Quiz - Set 2</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f6f9; margin:0; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
h1 { text-align:center; }
.question { margin-bottom:20px; }
.options label { display:block; margin:5px 0; cursor:pointer; }
button { display:block; margin:20px auto; padding:10px 20px; font-size:16px; border:none; border-radius:5px; background:#28a745; color:#fff; cursor:pointer; }
button:hover { background:#1e7e34; }
#result { text-align:center; font-size:20px; font-weight:bold; }
</style>
</head>
<body>
<div class="container">
<h1>Group 14 Elements MCQ TEST-2</h1>
<form id="quizForm"></form>
<button onclick="submitQuiz()">Submit</button>
<div id="result"></div>
</div>
<script>
const questions = [
{q:"1. Which of the following describes the bonding in the 'Inorganic Graphite' (Boron Nitride) compared to Graphite?",
options:[
"A) BN is a conductor while Graphite is an insulator.",
"B) Both have delocalized π-systems, but BN is an insulator due to the large energy gap between B and N orbitals.",
"C) BN has a tetrahedral structure while Graphite is planar.",
"D) BN contains C—C bonds."], ans:"B"},

{q:"2. The hydrolysis of Me2SiCl2 (dimethyldichlorosilane) followed by condensation polymerization leads to the formation of:",
options:[
"A) Cross-linked silicone resin.",
"B) Linear silicone polymer (rubber/oil).",
"C) Silica gel.",
"D) Me3Si-O-SiMe3."], ans:"B"},

{q:"3. Carbon suboxide (C3O2) has a linear structure. The hybridization of the three carbon atoms (from left to right) is:",
options:[
"A) sp², sp, sp²",
"B) sp, sp, sp",
"C) sp², sp², sp²",
"D) sp³, sp, sp³"], ans:"B"},

{q:"4. In the silicate mineral Hemimorphite, Zn₄Si₂O₇(OH)₂·H₂O, the silicate unit present is:",
options:[
"A) Orthosilicate",
"B) Pyrosilicate (Si₂O₇⁶⁻)",
"C) Cyclic silicate",
"D) Sheet silicate"], ans:"B"},

{q:"5. Which Group 14 element forms the most stable dihalide (MX2)?",
options:["A) C","B) Si","C) Ge","D) Pb"], ans:"D"},

{q:"6. The softening of glass (annealing) occurs over a temperature range rather than at a specific melting point because:",
options:[
"A) It is a giant covalent molecule.",
"B) It is a supercooled liquid with a disordered, non-crystalline structure.",
"C) It contains impurities like Boron.",
"D) It has high thermal conductivity."], ans:"B"},

{q:"7. Thermodynamically, the most stable form of Carbon at room temperature and pressure is:",
options:["A) Diamond","B) Graphite","C) Fullerene","D) Coal"], ans:"B"},

{q:"8. Silicon dissolves in hot, concentrated NaOH solution to produce:",
options:[
"A) Si(OH)₄ and H₂",
"B) Na₂SiO₃ and H₂",
"C) Na₂SiO₃ and O₂",
"D) SiC and H₂O"], ans:"B"},

{q:"9. The Si—O—Si bond angle in Quartz is approximately 144°, much larger than 104.5° in H2O. This is attributed to:",
options:[
"A) pπ-dπ back-bonding from Oxygen to Silicon.",
"B) High electronegativity of Silicon.",
"C) Steric hindrance of bulky groups.",
"D) Lone pairs on Silicon."], ans:"A"},

{q:"10. Which of the following tetrahalides is NOT hydrolyzed by water?",
options:["A) SiCl₄","B) CCl₄","C) GeCl₄","D) SnCl₄"], ans:"B"},

{q:"11. In PbO₂, Lead acts as:",
options:["A) Reducing agent","B) Powerful oxidizing agent","C) Catalyst","D) Neutral oxide"], ans:"B"},

{q:"12. The coordination number of Silicon in Beryl (Be₃Al₂Si₆O₁₈) is:",
options:["A) 2","B) 3","C) 4","D) 6"], ans:"C"},

{q:"13. Which factor contributes most to the high hardness of Diamond?",
options:[
"A) High density.",
"B) Directional sp³ hybrid bonds in a 3D giant lattice.",
"C) Van der Waals forces.",
"D) Delocalized electrons."], ans:"B"},

{q:"14. Carborundum is the commercial name for:",
options:["A) Calcium carbide","B) Silicon carbide (SiC)","C) Aluminium carbide","D) Boron carbide"], ans:"B"},

{q:"15. Red Lead (Minium) is a mixed oxide with the formula:",
options:["A) PbO","B) PbO₂","C) Pb₃O₄","D) Pb₂O₃"], ans:"C"},

{q:"16. Which of the following is a 'chain silicate'?",
options:["A) Spodumene (LiAl(SiO₃)₂)","B) Muscovite mica","C) Olivine","D) Kaolinite"], ans:"A"},

{q:"17. In the reaction C + H₂SO₄ (conc.) →, the products are:",
options:["A) CO + SO₂ + H₂O","B) CO₂ + SO₂ + H₂O","C) CH₄ + SO₃","D) No reaction"], ans:"B"},

{q:"18. The stability of +4 oxidation state decreases down the group. Correct order:",
options:[
"A) Pb > Sn > Ge > Si",
"B) Si > Ge > Sn > Pb",
"C) Sn > Pb > Ge > Si",
"D) Ge > Si > Sn > Pb"], ans:"B"},

{q:"19. What is the structural unit of Ultramarines?",
options:[
"A) [SiO₄]⁴⁻",
"B) [Si₂O₇]⁶⁻",
"C) Aluminosilicate framework with S₃⁻ radical ions.",
"D) Pure SiO₂"], ans:"C"},

{q:"20. CO₂ is gas while SiO₂ is solid because:",
options:[
"A) CO₂ forms pπ-pπ bonds, SiO₂ forms 3D network.",
"B) Silicon more metallic.",
"C) CO₂ polar.",
"D) Carbon has d orbitals."], ans:"A"},

{q:"21. Silicones are used in surgical implants because they are:",
options:["A) Highly reactive","B) Biocompatible and inert","C) Water soluble","D) Very hard"], ans:"B"},

{q:"22. Tin (II) chloride (SnCl₂) acts as a:",
options:["A) Oxidizing agent","B) Reducing agent","C) Dehydrating agent","D) Bleaching agent"], ans:"B"},

{q:"23. Number of Si—O—Si bonds in Si₃O₉⁶⁻ is:",
options:["A) 2","B) 3","C) 6","D) 9"], ans:"B"},

{q:"24. In Lead storage battery, electrodes are:",
options:[
"A) Pb and PbO₂",
"B) PbO₂ and Pb",
"C) Pb and PbSO₄",
"D) Fe and Ni"], ans:"A"},

{q:"25. Compound used to clarify sugar is:",
options:["A) Wood charcoal","B) Animal charcoal","C) Lamp black","D) Coke"], ans:"B"}
];

const form = document.getElementById("quizForm");
questions.forEach((item,index)=>{
 let div=document.createElement("div");
 div.classList.add("question");
 div.innerHTML=`<p>${item.q}</p>`;
 item.options.forEach(opt=>{
   div.innerHTML+=`<label><input type="radio" name="q${index}" value="${opt.charAt(0)}"> ${opt}</label>`;
 });
 form.appendChild(div);
});

function submitQuiz(){
 let score=0;
 questions.forEach((item,index)=>{
   let selected=document.querySelector(`input[name="q${index}"]:checked`);
   if(selected && selected.value===item.ans) score++;
 });
 document.getElementById("result").innerText=`Your Score: ${score} / ${questions.length}`;
}
</script>
</body>
</html>
