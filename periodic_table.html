<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Interactive Periodic Table</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

h1{
    padding:20px;
    margin:0;
}

#table{
    display:grid;
    grid-template-columns: repeat(18, 65px);
    gap:6px;
    justify-content:center;
    padding:20px;
}

.element{
    background:white;
    color:black;
    border-radius:8px;
    padding:4px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 6px rgba(0,0,0,0.4);
    font-size:12px;
}

.element:hover{
    transform:scale(1.08);
}

.number{
    font-size:10px;
    text-align:left;
}

.symbol{
    font-size:18px;
    font-weight:bold;
}

.name{
    font-size:9px;
}

.alkali{background:#ff7675;}
.alkaline{background:#fdcb6e;}
.transition{background:#74b9ff;}
.post{background:#81ecec;}
.metalloid{background:#a29bfe;}
.nonmetal{background:#55efc4;}
.halogen{background:#fab1a0;}
.noble{background:#e17055;}
.lanthanide{background:#ffeaa7;}
.actinide{background:#dfe6e9;}

#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    display:none;
    width:300px;
    z-index:10;
}

#close{
    cursor:pointer;
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Complete Interactive Periodic Table (118 Elements)</h1>

<div id="table"></div>

<div id="popup">
<span id="close" onclick="closePopup()">X</span>
<h2 id="pname"></h2>
<p><strong>Symbol:</strong> <span id="psymbol"></span></p>
<p><strong>Atomic Number:</strong> <span id="pnumber"></span></p>
<p><strong>Category:</strong> <span id="pcategory"></span></p>
</div>

<script>

const elements = [

[8,"O","Oxygen","nonmetal",2,16],
[9,"F","Fluorine","halogen",2,17],
[10,"Ne","Neon","noble",2,18],

[11,"Na","Sodium","alkali",3,1],
[12,"Mg","Magnesium","alkaline",3,2],
[13,"Al","Aluminium","post",3,13],
[14,"Si","Silicon","metalloid",3,14],
[15,"P","Phosphorus","nonmetal",3,15],
[16,"S","Sulfur","nonmetal",3,16],
[17,"Cl","Chlorine","halogen",3,17],
[18,"Ar","Argon","noble",3,18],

[19,"K","Potassium","alkali",4,1],

[21,"Sc","Scandium","transition",4,3],

[87,"Fr","Francium","alkali",7,1],

[104,"Rf","Rutherfordium","transition",7,4],

[107,"Bh","Bohrium","transition",7,7],

[113,"Nh","Nihonium","post",7,13],
[114,"Fl","Flerovium","post",7,14],
[115,"Mc","Moscovium","post",7,15],
[116,"Lv","Livermorium","post",7,16],
[117,"Ts","Tennessine","halogen",7,17],
[118,"Og","Oganesson","noble",7,18]
];

// Lanthanides 58–71
let lanRow=8;
for(let i=58;i<=71;i++){
    elements.push([i,"","", "lanthanide",8,i-54]);
}

// Actinides 90–103
for(let i=90;i<=103;i++){
    elements.push([i,"","", "actinide",9,i-86]);
}

const table=document.getElementById("table");

elements.forEach(el=>{
    let div=document.createElement("div");
    div.className="element "+el[3];
    div.style.gridRow=el[4];
    div.style.gridColumn=el[5];
    div.innerHTML=
        "<div class='number'>"+el[0]+"</div>"+
        "<div class='symbol'>"+el[1]+"</div>"+
        "<div class='name'>"+el[2]+"</div>";
    div.onclick=()=>showInfo(el[2],el[1],el[0],el[3]);
    table.appendChild(div);
});

function showInfo(name,symbol,number,category){
    document.getElementById("pname").innerText=name;
    document.getElementById("psymbol").innerText=symbol;
    document.getElementById("pnumber").innerText=number;
    document.getElementById("pcategory").innerText=category;
    document.getElementById("popup").style.display="block";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
