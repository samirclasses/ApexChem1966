<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
}

h1{
    padding:20px;
    margin:0;
}

#table{
    display:grid;
    grid-template-columns: repeat(18, 60px);
    gap:6px;
    justify-content:center;
    padding:20px;
}

.element{
    background:white;
    color:black;
    border-radius:8px;
    padding:5px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
}

.element:hover{
    transform:scale(1.1);
}

.number{
    font-size:10px;
    text-align:left;
}

.symbol{
    font-size:20px;
    font-weight:bold;
}

.name{
    font-size:10px;
}

.alkali{background:#ff9f43;}
.alkaline{background:#feca57;}
.transition{background:#48dbfb;}
.nonmetal{background:#1dd1a1;}
.noble{background:#ff6b6b;}
.metalloid{background:#a29bfe;}

#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    display:none;
    width:300px;
}

#close{
    cursor:pointer;
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Interactive Periodic Table</h1>

<div id="table">

<div class="element nonmetal" onclick="showInfo('Hydrogen','H','1','Non-metal')" style="grid-column:1;">
<div class="number">1</div>
<div class="symbol">H</div>
<div class="name">Hydrogen</div>
</div>

<div class="element noble" onclick="showInfo('Helium','He','2','Noble Gas')" style="grid-column:18;">
<div class="number">2</div>
<div class="symbol">He</div>
<div class="name">Helium</div>
</div>

<div class="element alkali" onclick="showInfo('Lithium','Li','3','Alkali Metal')" style="grid-column:1; grid-row:2;">
<div class="number">3</div>
<div class="symbol">Li</div>
<div class="name">Lithium</div>
</div>

<div class="element alkaline" onclick="showInfo('Beryllium','Be','4','Alkaline Earth Metal')" style="grid-column:2; grid-row:2;">
<div class="number">4</div>
<div class="symbol">Be</div>
<div class="name">Beryllium</div>
</div>

<div class="element metalloid" onclick="showInfo('Boron','B','5','Metalloid')" style="grid-column:13; grid-row:2;">
<div class="number">5</div>
<div class="symbol">B</div>
<div class="name">Boron</div>
</div>

<div class="element nonmetal" onclick="showInfo('Carbon','C','6','Non-metal')" style="grid-column:14; grid-row:2;">
<div class="number">6</div>
<div class="symbol">C</div>
<div class="name">Carbon</div>
</div>

<div class="element nonmetal" onclick="showInfo('Nitrogen','N','7','Non-metal')" style="grid-column:15; grid-row:2;">
<div class="number">7</div>
<div class="symbol">N</div>
<div class="name">Nitrogen</div>
</div>

<div class="element nonmetal" onclick="showInfo('Oxygen','O','8','Non-metal')" style="grid-column:16; grid-row:2;">
<div class="number">8</div>
<div class="symbol">O</div>
<div class="name">Oxygen</div>
</div>

<div class="element nonmetal" onclick="showInfo('Fluorine','F','9','Non-metal')" style="grid-column:17; grid-row:2;">
<div class="number">9</div>
<div class="symbol">F</div>
<div class="name">Fluorine</div>
</div>

<div class="element noble" onclick="showInfo('Neon','Ne','10','Noble Gas')" style="grid-column:18; grid-row:2;">
<div class="number">10</div>
<div class="symbol">Ne</div>
<div class="name">Neon</div>
</div>

</div>

<div id="popup">
<span id="close" onclick="closePopup()">X</span>
<h2 id="pname"></h2>
<p><strong>Symbol:</strong> <span id="psymbol"></span></p>
<p><strong>Atomic Number:</strong> <span id="pnumber"></span></p>
<p><strong>Category:</strong> <span id="pcategory"></span></p>
</div>

<script>

function showInfo(name,symbol,number,category){
    document.getElementById("pname").innerText = name;
    document.getElementById("psymbol").innerText = symbol;
    document.getElementById("pnumber").innerText = number;
    document.getElementById("pcategory").innerText = category;
    document.getElementById("popup").style.display="block";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
