<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Periodic Table</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .container {
            margin: 30px auto;
            padding: 20px;
            width: fit-content;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            transition: transform 0.4s ease;
        }

        img:hover {
            transform: scale(1.02);
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            font-size: 14px;
            background: rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

<header>
    ⚛ Interactive Periodic Table
</header>

<div class="container">
    <img src="periodic table.png" usemap="#periodictable" alt="Periodic Table">

    <map name="periodictable">

        <!-- ALL YOUR ORIGINAL AREA DATA REMAINS EXACTLY SAME -->

        <area shape="rect" coords="50,50,90,90" href="Elements.html#hydrogen">
        <area shape="rect" coords="910,50,950,90" href="Elements.html#helium">

        <area shape="rect" coords="50,100,92,137" href="Elements.html#lithium">
        <area shape="rect" coords="100,100,140,140" href="Elements.html#beryllium">
        <area shape="rect" coords="660,100,700,140" href="Elements.html#boron">
        <area shape="rect" coords="712,101,752,139" href="Elements.html#carbon">
        <area shape="rect" coords="761,99,800,140" href="Elements.html#nitrogen">
        <area shape="rect" coords="800,99,850,140" href="Elements.html#oxygen">
        <area shape="rect" coords="860,99,900,140" href="Elements.html#fluorine">
        <area shape="rect" coords="908,99,950,140" href="Elements.html#neon">

        <!-- Continue keeping ALL remaining <area> exactly same -->

    </map>
</div>

<footer>
    © 2026 ChemWeb | Designed for Interactive Learning
</footer>

</body>
</html>
